<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Africa News Map - Language Selection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #efcc00;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { max-width: 900px; width: 100%; text-align: center; }
        .title { color: #333; margin-bottom: 50px; animation: fadeInDown 0.8s ease; }
        .title h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .title p { font-size: 1.1rem; opacity: 0.8; }
        .language-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 30px; margin-bottom: 50px; animation: fadeInUp 0.8s ease; }
        .language-card {
            background: white; border-radius: 20px; padding: 35px 25px;
            transition: all 0.3s ease; text-decoration: none; display: block;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); cursor: pointer;
        }
        .language-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .language-flag { font-size: 4.5rem; margin-bottom: 15px; }
        .language-name { font-size: 1.8rem; font-weight: bold; margin-bottom: 8px; color: #333; }
        .language-desc { color: #666; font-size: 0.9rem; }
        .card-en { border-top: 5px solid #1a9850; }
        .card-fr { border-top: 5px solid #0055a4; }
        .card-pt { border-top: 5px solid #009c3b; }
        .stats { color: #333; margin-top: 20px; font-size: 0.9rem; opacity: 0.7; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) {
            .title h1 { font-size: 1.8rem; }
            .language-name { font-size: 1.4rem; }
            .language-flag { font-size: 3rem; }
            .language-card { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Africa In News</h1>
            <p>Select your language to explore news across Africa</p>
        </div>
        <div class="language-grid">
            <a href="africa_map_en.html" class="language-card card-en">
                 <!--<div class="language-flag">🇬🇧</div>-->
                <div class="language-name">English</div>
                <div class="language-desc">News in English</div>
            </a>
            <a href="africa_map_fr.html" class="language-card card-fr">
                <!--<div class="language-flag">🇫🇷</div>-->
                <div class="language-name">Français</div>
                <div class="language-desc">Actualités en français</div>
            </a>
            <a href="africa_map_pt.html" class="language-card card-pt">
                <!--<div class="language-flag">🇵🇹</div>-->
                <div class="language-name">Português</div>
                <div class="language-desc">Notícias em português</div>
            </a>
        </div>
        
    </div>
</body>
</html>
