<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
        <title>World News Map - Language Selection</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
                background: #efcc00;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 16px;
            }

            /* Compact container optimized for mobile */
            .container {
                max-width: 600px;
                width: 100%;
                text-align: center;
                background: transparent;
                border-radius: 32px;
            }

            /* Title stays clean but uses less vertical space */
            .title {
                color: #1e2a3a;
                margin-bottom: 20px;
                animation: fadeInDown 0.6s ease;
            }

            .title h1 {
                font-size: 1.9rem;
                letter-spacing: -0.3px;
                font-weight: 700;
                margin-bottom: 6px;
                background: linear-gradient(135deg, #1e2a3a 0%, #2c3e4e 100%);
                background-clip: text;
                -webkit-background-clip: text;
                color: transparent;
            }

            .title p {
                font-size: 0.85rem;
                opacity: 0.75;
                font-weight: 500;
            }

            /* 2-COLUMN GRID: more compact, fits 10 cards on any phone without overflow */
            .language-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                margin-bottom: 20px;
                animation: fadeInUp 0.6s ease;
            }

            /* Smaller card design – reduced padding & typography, still tappable */
            .language-card {
                background: white;
                border-radius: 20px;
                padding: 14px 8px;
                transition: all 0.2s ease;
                text-decoration: none;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
                cursor: pointer;
                border: 1px solid rgba(0, 0, 0, 0.03);
            }

            /* Subtle hover effect on larger devices, but on mobile it just gives feedback */
            .language-card:active {
                transform: scale(0.97);
                background: #fef9e6;
                transition: 0.05s;
            }

            /* No flag icons, cleaner and less height */
            .language-name {
                font-size: 1.1rem;
                font-weight: 700;
                margin-bottom: 4px;
                color: #1f2e3a;
                letter-spacing: -0.2px;
            }

            /* Description font size reduced to save vertical space, still readable */
            .language-desc {
                color: #5a6874;
                font-size: 0.7rem;
                font-weight: 500;
                line-height: 1.2;
                max-width: 100%;
                white-space: nowrap;
                overflow-x: hidden;
                text-overflow: ellipsis;
            }

            /* Top accent borders preserve language identity */
            .card-en { border-top: 3px solid #1a9850; }
            .card-fr { border-top: 3px solid #0055a4; }
            .card-pt { border-top: 3px solid #009c3b; }
            .card-es { border-top: 3px solid #f1bf00; }
            .card-zh { border-top: 3px solid #de2910; }
            .card-id { border-top: 3px solid #e73f1c; }
            .card-hi { border-top: 3px solid #ff9933; }
            .card-ar { border-top: 3px solid #165a4c; }
            .card-bn { border-top: 3px solid #006a4e; }
            .card-ur { border-top: 3px solid #9b7e64; }

            /* subtle stats at bottom */
            .stats {
                color: #2c3e2f;
                margin-top: 12px;
                font-size: 0.7rem;
                opacity: 0.7;
                font-weight: 500;
                background: rgba(255, 248, 205, 0.6);
                display: inline-block;
                padding: 6px 14px;
                border-radius: 40px;
                backdrop-filter: blur(2px);
            }

            /* animations */
            @keyframes fadeInDown {
                from {
                    opacity: 0;
                    transform: translateY(-18px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(18px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* For extremely narrow phones (below 380px) keep two columns but shrink text further */
            @media (max-width: 420px) {
                body {
                    padding: 12px;
                }
                .language-name {
                    font-size: 0.95rem;
                }
                .language-desc {
                    font-size: 0.6rem;
                    white-space: normal;
                    word-break: keep-all;
                }
                .language-card {
                    padding: 12px 6px;
                }
                .title h1 {
                    font-size: 1.6rem;
                }
                .language-grid {
                    gap: 10px;
                }
            }

            /* Extra small devices (like iPhone SE, 320px) – keep all cards completely visible */
            @media (max-width: 360px) {
                .language-name {
                    font-size: 0.85rem;
                }
                .language-desc {
                    font-size: 0.55rem;
                }
                .language-card {
                    padding: 10px 4px;
                    border-radius: 16px;
                }
                .container {
                    padding: 0 2px;
                }
            }

            /* landscape mode: still two columns but height comfortable */
            @media (max-height: 500px) and (orientation: landscape) {
                body {
                    padding: 10px;
                }
                .language-grid {
                    gap: 8px;
                    margin-bottom: 8px;
                }
                .language-card {
                    padding: 8px 6px;
                }
                .title {
                    margin-bottom: 8px;
                }
                .title h1 {
                    font-size: 1.4rem;
                    margin-bottom: 0;
                }
            }

            /* Remove default tap highlight on mobile */
            .language-card {
                -webkit-tap-highlight-color: transparent;
            }
        </style>
    </head>
    <body>
    <div class="container">
        <div class="title">
            <h1>Global Brief</h1>
            <!-- subtitle removed for more compact layout, optional but leaving minimal -->
        </div>

        <div class="language-grid">
            <!-- English -->
            <a href="world_map_en.html" class="language-card card-en">
                <div class="language-name">English</div>
                <div class="language-desc">World News</div>
            </a>
            <!-- Français -->
            <a href="world_map_fr.html" class="language-card card-fr">
                <div class="language-name">Français</div>
                <div class="language-desc">Actualités monde</div>
            </a>
            <!-- Português -->
            <a href="world_map_pt.html" class="language-card card-pt">
                <div class="language-name">Português</div>
                <div class="language-desc">Notícias mundiais</div>
            </a>
            <!-- Español -->
            <a href="world_map_es.html" class="language-card card-es">
                <div class="language-name">Español</div>
                <div class="language-desc">Noticias globales</div>
            </a>
            <!-- 中文 (Chinese) -->
            <a href="world_map_zh.html" class="language-card card-zh">
                <div class="language-name">中文</div>
                <div class="language-desc">全球新闻</div>
            </a>
            <!-- Indonesian -->
            <a href="world_map_id.html" class="language-card card-id">
                <div class="language-name">Indonesia</div>
                <div class="language-desc">Berita Dunia</div>
            </a>
            <!-- हिंदी -->
            <a href="world_map_hi.html" class="language-card card-hi">
                <div class="language-name">हिंदी</div>
                <div class="language-desc">विश्व समाचार</div>
            </a>
            <!-- عربي -->
            <a href="world_map_ar.html" class="language-card card-ar">
                <div class="language-name">العربية</div>
                <div class="language-desc">أخبار العالم</div>
            </a>
            <!-- বাংলা -->
            <a href="world_map_bn.html" class="language-card card-bn">
                <div class="language-name">বাংলা</div>
                <div class="language-desc">বিশ্ব সংবাদ</div>
            </a>
            <!-- اردو -->
            <a href="world_map_ur.html" class="language-card card-ur">
                <div class="language-name">اردو</div>
                <div class="language-desc">عالمی خبریں</div>
            </a>
        </div>


    </div>
    </body>
    </html>
